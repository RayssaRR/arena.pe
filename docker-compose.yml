services:
  postgres:
    image: postgres:16-alpine
    container_name: arena_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: arena
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: arena123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d arena"]
      interval: 10s
      timeout: 5s
      retries: 10

  back-end:
    image: maven:3.9-eclipse-temurin-25
    container_name: arena_backend
    working_dir: /app
    command: sh -c "./mvnw spring-boot:run"
    volumes:
      - ./back-end:/app
      - maven_cache:/root/.m2
      - uploads_data:/app/uploads
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/arena
      SPRING_DATASOURCE_USERNAME: arena
      SPRING_DATASOURCE_PASSWORD: arena123
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.PostgreSQLDialect
      APP_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy


  front-end:
    image: node:22-alpine
    container_name: arena_frontend
    working_dir: /app
    command: sh -c "npm install && npm run build && npm run start"
    volumes:
      - ./front-end:/app
      - frontend_node_modules:/app/node_modules
    ports:
      - "3000:3000"
    depends_on:
      - back-end

volumes:
  postgres_data:
  maven_cache:
  uploads_data:
  frontend_node_modules:
