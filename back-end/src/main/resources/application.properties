spring.application.name=arenape

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/arena}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:com.mysql.cj.jdbc.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:arena}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:arena123}

spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8
spring.jpa.hibernate.ddl-auto=create-drop
